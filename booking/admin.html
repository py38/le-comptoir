<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Le Comptoir</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../assets/img/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="booking.css">
</head>
<body>
<div class="grain"></div>

<header class="bk-top">
  <span class="bk-brand"><img src="../assets/img/logo.jpeg" alt="Le Comptoir"><span>Le Comptoir · Agenda</span></span>
  <button class="bk-back" id="logoutBtn" hidden>Déconnexion →</button>
</header>

<div class="bk-demo" id="demoBadge" hidden>Mode démonstration — données locales à cet appareil</div>

<!-- LOGIN -->
<div class="adm-login" id="loginView">
  <h1>Espace restaurant</h1>
  <p id="loginHint">Connectez-vous pour gérer l'agenda.</p>
  <form class="bk-form" id="loginForm">
    <label id="emailWrap">Email<input type="email" id="admEmail" placeholder="email@lecomptoir.ci"></label>
    <label>Mot de passe<input type="password" id="admPw" placeholder="••••••••" required></label>
    <button type="submit" class="btn btn--gold">Se connecter</button>
    <p class="bk-msg" id="loginMsg"></p>
  </form>
</div>

<!-- DASHBOARD -->
<main class="bk-wrap" id="dashView" hidden style="max-width:1240px">
  <div class="cx-bar">
    <div class="cx-views" id="cxViews">
      <button data-v="day">Jour</button>
      <button data-v="week">Semaine</button>
      <button class="active" data-v="month">Mois</button>
      <button data-v="year">Année</button>
    </div>
    <div class="cx-nav">
      <button id="cxPrev" aria-label="Précédent">‹</button>
      <button class="today" id="cxToday">Aujourd'hui</button>
      <button id="cxNext" aria-label="Suivant">›</button>
    </div>
    <h2 class="cx-title" id="cxTitle">—</h2>
    <div class="cx-stats">
      <div class="cx-stat"><b id="statResa">0</b><span>Réservations à venir</span></div>
      <div class="cx-stat"><b id="statCouverts">0</b><span>Couverts aujourd'hui</span></div>
    </div>
  </div>

  <div class="cap-bar">
    <label>Couverts / jour (défaut)
      <input type="number" id="defCap" min="0" style="width:80px">
    </label>
    <button class="mini" id="saveDefCap">Enregistrer</button>
    <span class="sp"></span>
    <span id="dayCapInfo"></span>
  </div>

  <div class="cx-canvas" id="cxCanvas"></div>
  <p class="cx-hint">‹ Glissez horizontalement (ou utilisez les flèches) pour changer de période ›</p>
</main>

<!-- Détail réservation -->
<div class="rz-modal" id="rzModal">
  <div class="rz-card">
    <button class="rz-close" id="rzClose" aria-label="Fermer">&times;</button>
    <h3 id="rzTitle">Réservation</h3>
    <div id="rzBody"></div>
    <button class="btn btn--ghost" id="rzCancel" style="margin-top:1.2rem;width:100%">Annuler la réservation</button>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="store.js"></script>
<script src="admin.js"></script>
</body>
</html>
